<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Control</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(rgba(249,115,22,.65),rgba(253,186,116,.65)),
url("../../Images/ss.jpeg");

background-size:cover;
background-position:center;
min-height:100vh;

}

.top-bar{

position:fixed;
top:0;
width:100%;
height:60px;

background:rgba(249,115,22,.95);

display:flex;
justify-content:center;
align-items:center;

color:white;
font-size:22px;
font-weight:bold;

}

.bottom-bar{

position:fixed;
bottom:0;
width:100%;
height:40px;

background:rgba(249,115,22,.95);

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.container{

width:90%;
max-width:1200px;

margin:90px auto 70px;

}

.welcome-card{

background:white;

padding:20px;

border-radius:12px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 5px 20px rgba(0,0,0,.15);

margin-bottom:25px;

}

.date-box{

color:#f97316;

font-weight:bold;

}

.cards{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-bottom:25px;

}

.card{

background:white;

padding:25px;

border-radius:12px;

text-align:center;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.card h3{

color:#666;

margin-bottom:10px;

}

.card h1{

color:#f97316;

font-size:40px;

}

.chart-card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 5px 20px rgba(0,0,0,.15);

margin-bottom:25px;

}

.buttons{

display:flex;

gap:20px;

justify-content:center;

}

.orange-btn{

text-decoration:none;

background:linear-gradient(135deg,#f97316,#fdba74);

padding:13px 35px;

color:white;

font-weight:bold;

border-radius:8px;

transition:.3s;

}

.orange-btn:hover{

transform:translateY(-3px);

}

.cards{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:25px;

}

.filter-box{

display:flex;

gap:15px;

flex-wrap:wrap;

margin-bottom:25px;

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.filter-box input,
.filter-box select{

flex:1;

padding:12px;

border:1px solid #ccc;

border-radius:8px;

}

.buttons{

margin-top:25px;

display:flex;

justify-content:center;

gap:15px;

}
</style>

</head>

<body>

<header class="top-bar">

Hybrid Attendance System

</header>

<div class="container">

<h1>Attendance Control</h1>

<div class="filter-box">

<input
type="text"
id="searchStudent"
placeholder="Search Student">

<select id="subject">

<option>All Subjects</option>
<option>Web Engineering</option>
<option>Operating System</option>
<option>Database System</option>

</select>

<input
type="date"
id="attendanceDate">

<button class="orange-btn" id="searchBtn">

Search

</button>

</div>

<table>

<tr>

<th>Roll No</th>
<th>Name</th>
<th>Subject</th>
<th>Date</th>
<th>Status</th>
<th>Actions</th>

</tr>

<tr>

<td>21-CS-001</td>
<td>Ali Ahmed</td>
<td>Web Engineering</td>
<td>15-07-2026</td>
<td style="color:green;">Present</td>

<td>

<button class="orange-btn action-btn">

Edit

</button>

<button class="orange-btn action-btn">

Delete

</button>

</td>

</tr>

<tr>

<td>21-CS-002</td>
<td>Ahmed Raza</td>
<td>Operating System</td>
<td>15-07-2026</td>
<td style="color:red;">Absent</td>

<td>

<button class="orange-btn action-btn">

Edit

</button>

<button class="orange-btn action-btn">

Delete

</button>

</td>

</tr>

<tr>

<td>21-CS-003</td>
<td>Usman Ali</td>
<td>Database System</td>
<td>14-07-2026</td>
<td style="color:green;">Present</td>

<td>

<button class="orange-btn action-btn">

Edit

</button>

<button class="orange-btn action-btn">

Delete

</button>

</td>

</tr>

</table>

<div class="buttons">

<button class="orange-btn" id="reportBtn">

Generate Report

</button>

<a
href="Dashboard.html"
class="orange-btn">

Dashboard

</a>

</div>

</div>

<footer class="bottom-bar">

© 2026 Hybrid Attendance System

</footer>

<script>
  document.getElementById("searchBtn").onclick = function(){

alert("Attendance Search Completed!");

}

document.getElementById("reportBtn").onclick = function(){

alert("Report Generation Feature Coming Soon!");

}
</script>

</body>

</html>
