<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(rgba(249,115,22,.65),rgba(253,186,116,.65)),
url("../../Images/ss.jpeg");

background-size:cover;
background-position:center;
min-height:100vh;

}

.top-bar{

position:fixed;
top:0;
width:100%;
height:60px;

background:rgba(249,115,22,.95);

display:flex;
justify-content:center;
align-items:center;

color:white;
font-size:22px;
font-weight:bold;

}

.bottom-bar{

position:fixed;
bottom:0;
width:100%;
height:40px;

background:rgba(249,115,22,.95);

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.container{

width:90%;
max-width:1200px;

margin:90px auto 70px;

}

.welcome-card{

background:white;

padding:20px;

border-radius:12px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 5px 20px rgba(0,0,0,.15);

margin-bottom:25px;

}

.date-box{

color:#f97316;

font-weight:bold;

}

.cards{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-bottom:25px;

}

.card{

background:white;

padding:25px;

border-radius:12px;

text-align:center;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.card h3{

color:#666;

margin-bottom:10px;

}

.card h1{

color:#f97316;

font-size:40px;

}

.chart-card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 5px 20px rgba(0,0,0,.15);

margin-bottom:25px;

}

.buttons{

display:flex;

gap:20px;

justify-content:center;

}

.orange-btn{

text-decoration:none;

background:linear-gradient(135deg,#f97316,#fdba74);

padding:13px 35px;

color:white;

font-weight:bold;

border-radius:8px;

transition:.3s;

}

.orange-btn:hover{

transform:translateY(-3px);

}

.cards{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:25px;

}

.top-section{

display:flex;

justify-content:space-between;

gap:15px;

margin-bottom:25px;

}

.top-section input{

flex:1;

padding:12px;

border:1px solid #ccc;

border-radius:8px;

}

table{

width:100%;

background:white;

border-collapse:collapse;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}

th{

background:#f97316;

color:white;

padding:15px;

}

td{

padding:12px;

text-align:center;

border-bottom:1px solid #ddd;

}

tr:hover{

background:#fff7ed;

}

.action-btn{

padding:8px 15px;

margin:2px;

}

.buttons{

margin-top:25px;

text-align:center;

}
</style>

</head>

<body>

<header class="top-bar">

Hybrid Attendance System

</header>

<div class="container">

<h1>User Management</h1>

<div class="top-section">

<input
type="text"
id="searchUser"
placeholder="Search User">

<button class="orange-btn" id="addBtn">

Add User

</button>

</div>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Role</th>
<th>Email</th>
<th>Actions</th>

</tr>

<tr>

<td>1</td>
<td>Ali Ahmed</td>
<td>Student</td>
<td>ali@gmail.com</td>

<td>

<button class="orange-btn action-btn">

Edit

</button>

<button class="orange-btn action-btn">

Delete

</button>

</td>

</tr>

<tr>

<td>2</td>
<td>Ahmed Raza</td>
<td>Teacher</td>
<td>ahmed@gmail.com</td>

<td>

<button class="orange-btn action-btn">

Edit

</button>

<button class="orange-btn action-btn">

Delete

</button>

</td>

</tr>

<tr>

<td>3</td>
<td>Usman Ali</td>
<td>Student</td>
<td>usman@gmail.com</td>

<td>

<button class="orange-btn action-btn">

Edit

</button>

<button class="orange-btn action-btn">

Delete

</button>

</td>

</tr>

</table>

<div class="buttons">

<a
href="./Dashboard.html"
class="orange-btn">

Dashboard

</a>

</div>

</div>

<footer class="bottom-bar">

© 2026 Hybrid Attendance System

</footer>

alert("Add User Feature Coming Soon!");

}
</script>

</body>

</html>
