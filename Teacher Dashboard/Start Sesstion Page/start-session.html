<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Start Session</title>

<link rel="stylesheet" href="start-session.css">

</head>

<body>

<header class="top-bar">

Hybrid Attendance System

</header>

<div class="container">

<h1>Start Attendance Session</h1>

<div class="form-card">

<form>

<label>Subject</label>

<select id="subject" name="subject">

<option>Select Subject</option>

<option>Web Engineering</option>

<option>Operating System</option>

<option>Database System</option>

<option>Artificial Intelligence</option>

</select>

<label>Semester</label>

<select id="semester" name="semester">

<option>Select Semester</option>

<option>1</option>

<option>2</option>

<option>3</option>

<option>4</option>

<option>5</option>

<option>6</option>

<option>7</option>

<option>8</option>

</select>

<label>Section</label>

<select id="section" name="section">

<option>Select Section</option>

<option>A</option>

<option>B</option>

<option>C</option>

</select>

<label>Date</label>

<input
type="date"
id="date"
name="date">

<label>Start Time</label>

<input
type="time"
id="startTime"
name="startTime">

<label>Duration</label>

<select
id="duration"
name="duration">

<option>30 Minutes</option>

<option>45 Minutes</option>

<option>60 Minutes</option>

<option>90 Minutes</option>

</select>

<div class="buttons">

<button
type="button"
id="startBtn"
class="orange-btn">

Start Session

</button>

<a
href="../teacher-dashboard.html"
class="orange-btn">

Back

</a>

</div>

</form>

</div>

</div>

<footer class="bottom-bar">

© 2026 Hybrid Attendance System

</footer>

<script src="start-session.js"></script>

</body>

</html>
