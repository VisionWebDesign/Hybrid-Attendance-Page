<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<link rel="stylesheet" href="teacher-dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header class="top-bar">

Hybrid Attendance System

</header>

<div class="container">

<div class="welcome-card">

<div>

<h2 id="teacherName">

Welcome, Sir Ahmed

</h2>

<p id="teacherDepartment">

Computer Science Department

</p>

</div>

<div>

<h3 id="todayDate"></h3>

</div>

</div>

<!-- Statistics -->

<div class="cards">

<div class="card">

<h3>Total Students</h3>

<h1 id="totalStudents">120</h1>

</div>

<div class="card">

<h3>Today's Attendance</h3>

<h1 id="todayAttendance">108</h1>

</div>

<div class="card">

<h3>Active Session</h3>

<h1 id="activeSession">1</h1>

</div>

</div>

<!-- Chart -->

<div class="chart-card">

<canvas id="teacherChart"></canvas>

</div>

<!-- Quick Buttons -->

<div class="buttons">

<a href="./Start Sesstion Page/start-session.html" class="orange-btn">

Start Session

</a>

<a href="./Attendance Record Page/attendance-history.html" class="orange-btn">

Attendance Record

</a>

<a href="/Login-form/Login.html" class="orange-btn">

Logout

</a>

</div>

</div>

<footer class="bottom-bar">

© 2026 Hybrid Attendance System

</footer>

<script src="teacher-dashboard.js"></script>

</body>

</html>
